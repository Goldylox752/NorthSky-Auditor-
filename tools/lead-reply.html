<script>
document.addEventListener("DOMContentLoaded", () => {

  let uses = localStorage.getItem('uses') || 0;
  let paid = localStorage.getItem('paid');

  function loadHistory() {
    const history = JSON.parse(localStorage.getItem('history')) || [];
    const list = document.getElementById('history');

    if (!list) return; // 🔒 prevents crash

    list.innerHTML = "";

    history.slice().reverse().forEach(item => {
      const div = document.createElement('div');
      div.style.marginTop = "10px";
      div.style.padding = "10px";
      div.style.background = "#0f172a";
      div.style.borderRadius = "8px";

      div.innerHTML = `
        <strong>Lead:</strong> ${item.input}<br><br>
        <strong>Reply:</strong> ${item.reply}
      `;

      list.appendChild(div);
    });
  }

  window.generateReply = async function() {
    const input = document.getElementById('lead').value;
    const output = document.getElementById('output');

    if (!input) {
      output.innerText = "Enter a message";
      return;
    }

    if (!paid && uses >= 3) {
      output.innerHTML = `
        🚫 Free limit reached<br><br>
        <a href="/" style="color:#38bdf8;">Upgrade to unlock unlimited replies</a>
      `;
      return;
    }

    uses++;
    localStorage.setItem('uses', uses);

    output.innerText = "Thinking... 🤖";

    try {
      const res = await fetch('/api/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: input })
      });

      const data = await res.json();

      if (res.ok) {
        output.innerText = data.reply;

        const history = JSON.parse(localStorage.getItem('history')) || [];

        history.push({
          input: input,
          reply: data.reply
        });

        localStorage.setItem('history', JSON.stringify(history));

        loadHistory();

      } else {
        output.innerText = data.error || "Error";
      }

    } catch (err) {
      output.innerText = "Connection failed";
    }
  }

  loadHistory();
});
</script>
