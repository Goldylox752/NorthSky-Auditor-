<script>
let uses = localStorage.getItem('uses') || 0;
let paid = localStorage.getItem('paid');

async function generateReply() {
  const input = document.getElementById('lead').value;
  const output = document.getElementById('output');

  if (!input) {
    output.innerText = "Enter a message";
    return;
  }

  // 🔒 LIMIT
  if (!paid && uses >= 3) {
    output.innerHTML = `
      🚫 Free limit reached<br><br>
      <a href="/" style="color:#38bdf8;">Upgrade to unlock unlimited replies</a>
    `;
    return;
  }

  uses++;
  localStorage.setItem('uses', uses);

  output.innerText = "Thinking... 🤖";

  try {
    const res = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: input })
    });

    const data = await res.json();

    if (res.ok) {
      output.innerText = data.reply;
    } else {
      output.innerText = data.error || "Something went wrong";
    }

  } catch (err) {
    output.innerText = "Connection failed";
  }
}
</script>
