<script>
// =============================
// 🌌 NORTHSKY CORE ENGINE
// =============================
const NorthSky = {
  state: {
    paid: false,
    uses: parseInt(localStorage.getItem("ns_uses") || "0"),
    email: localStorage.getItem("ns_email") || null
  },

  config: {
    freeLimit: 3,
    checkout: {
      "one-time": "https://buy.stripe.com/cNi6oA1eraKU7ZR1QQ2ZO0u",
      "monthly": "https://buy.stripe.com/00w8wIg9lf1a0xpbrq2ZO0v"
    }
  }
};

// =============================
// 🚀 INIT
// =============================
NorthSky.init = async function () {
  this.updateStatus();
  if (this.state.email) await this.checkAccess();
};

// =============================
// 🔐 ACCESS CHECK
// =============================
NorthSky.checkAccess = async function () {
  try {
    const res = await fetch("/api/check-user", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ email: this.state.email })
    });

    const data = await res.json();
    this.state.paid = !!data?.paid;

  } catch (err) {
    console.error("Access check failed:", err);
    this.state.paid = false;
  }

  this.updateStatus();
};

// =============================
// 📊 STATUS UI
// =============================
NorthSky.updateStatus = function () {
  const el = document.getElementById("usageStatus");
  if (!el) return;

  if (this.state.paid) {
    el.innerHTML = "✅ Pro — Unlimited Access";
  } else {
    const remaining = Math.max(0, this.config.freeLimit - this.state.uses);
    el.innerHTML = `⚠️ Free Plan — ${remaining} left`;
  }
};

// =============================
// 👤 USER
// =============================
NorthSky.saveUser = function () {
  const email = document.getElementById("email").value.trim();

  if (!email || !email.includes("@")) {
    alert("Enter a valid email");
    return;
  }

  this.state.email = email;
  localStorage.setItem("ns_email", email);

  document.getElementById("userStatus").innerText = "✅ Saved";
  this.checkAccess();
};

// =============================
// 💳 CHECKOUT
// =============================
NorthSky.checkout = function (type = "one-time") {
  if (!this.state.email) {
    alert("Enter your email first");
    return;
  }

  const url = `${this.config.checkout[type]}?prefilled_email=${encodeURIComponent(this.state.email)}`;
  window.location.href = url;
};

// =============================
// ⏳ DELAY
// =============================
NorthSky.delay = ms => new Promise(res => setTimeout(res, ms));

// =============================
// 🚀 ANALYZE
// =============================
NorthSky.analyze = async function () {
  const inputEl = document.getElementById("site");
  const output = document.getElementById("output");

  let site = inputEl.value.trim();

  // ❌ EMPTY
  if (!site) {
    output.innerText = "Enter your website URL";
    return;
  }

  // ❌ INVALID
  if (!site.includes(".")) {
    output.innerText = "Enter a valid website (example.com)";
    return;
  }

  // 🔧 AUTO FIX URL
  if (!site.startsWith("http")) {
    site = "https://" + site;
  }

  // 🚫 LIMIT CHECK
  if (!this.state.paid && this.state.uses >= this.config.freeLimit) {
    output.innerHTML = `
      🚫 Free limit reached<br><br>
      <div class="highlight">
        Most sites increase conversions 30–50%
      </div><br>
      <button class="btn" onclick="NorthSky.checkout()">
        Unlock Full AI 🚀
      </button>
    `;
    return;
  }

  // increment usage
  this.state.uses++;
  localStorage.setItem("ns_uses", this.state.uses);
  this.updateStatus();

  // 🎬 LOADING
  output.innerHTML = `
    🤖 Running AI scan...<br><br>
    🔍 Checking structure...
  `;

  await this.delay(500);
  output.innerHTML += "<br>📊 Analyzing conversions...";
  await this.delay(500);
  output.innerHTML += "<br>⚡ Building report...<br><br>";

  // =============================
  // 💰 REAL API CALL
  // =============================
  try {
    const res = await fetch("/api/analyze", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ site })
    });

    const data = await res.json();

    if (!res.ok) {
      output.innerHTML = data.result || "⚠️ Error analyzing site";
      return;
    }

    output.innerHTML = `
      <strong>📊 Full AI Report</strong><br><br>
      ${data.result.replace(/\n/g, "<br>")}
    `;

  } catch (err) {
    console.error(err);
    output.innerHTML = "⚠️ Network error";
  }
};

// =============================
NorthSky.init();
</script>
